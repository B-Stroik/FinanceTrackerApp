services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financetracker-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Password123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "Your_strong_Password123", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sql_data:/var/opt/mssql

  sql-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./db/init:/init
    entrypoint: >
      /bin/bash -c '
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "Your_strong_Password123" -i /init/init-databases.sql
      '
    restart: "no"

volumes:
  sql_data:
